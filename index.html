<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LiPo Tracker</title>

<style>
body{
background:#1e1e1e;
color:white;
font-family:Arial,sans-serif;
padding:15px;
margin:0;
}

h1{
text-align:center;
}

.stats{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:15px;
flex-wrap:wrap;
}

.stat{
padding:10px;
border-radius:10px;
background:#333;
}

.card{
background:#333;
padding:15px;
margin-bottom:12px;
border-radius:12px;
}

.volkaart{
border-left:8px solid green;
}

.storagekaart{
border-left:8px solid orange;
}

.leegkaart{
border-left:8px solid red;
}

button{
border:none;
padding:10px;
margin:4px;
border-radius:8px;
font-size:16px;
}

.vol{
background:green;
color:white;
}

.storage{
background:orange;
}

.leeg{
background:red;
color:white;
}

.terug{
background:#666;
color:white;
}

.small{
font-size:13px;
color:#ccc;
}
</style>
</head>

<body>

<h1>🔋 LiPo Tracker</h1>

<div id="app"></div>

<script>

const STORAGE_KEY="lipo_tracker_v1";

let accus=[];

function maakAccus(){

for(let i=1;i<=20;i++){

accus.push({
id:"ACCU-"+String(i).padStart(3,"0"),
type:"6S 1350mAh",
status:"Storage",
cycli:0,
laatste:"Nog nooit"
});

}

}

function laden(){

const data=localStorage.getItem(STORAGE_KEY);

if(data){

accus=JSON.parse(data);

}else{

maakAccus();
opslaan();

}

}

function opslaan(){

localStorage.setItem(
STORAGE_KEY,
JSON.stringify(accus)
);

}

function tijd(){

return new Date().toLocaleString("nl-NL");

}

function setVol(index){

accus[index].status="Vol";
accus[index].cycli++;
accus[index].laatste=tijd();

opslaan();
render();

}

function setStorage(index){

accus[index].status="Storage";
accus[index].laatste=tijd();

opslaan();
render();

}

function setLeeg(index){

accus[index].status="Leeg";
accus[index].laatste=tijd();

opslaan();
render();

}

function statusClass(status){

if(status==="Vol") return "volkaart";

if(status==="Leeg") return "leegkaart";

return "storagekaart";

}

function renderOverzicht(){

let vol=accus.filter(a=>a.status==="Vol").length;
let storage=accus.filter(a=>a.status==="Storage").length;
let leeg=accus.filter(a=>a.status==="Leeg").length;

let html=`

<div class="stats">
<div class="stat">🟢 ${vol} Vol</div>
<div class="stat">🟡 ${storage} Storage</div>
<div class="stat">🔴 ${leeg} Leeg</div>
</div>

`;

accus.forEach((a,index)=>{

html+=`

<div class="card ${statusClass(a.status)}">

<h3>${a.id}</h3>

<p>${a.type}</p>

<p>Status: <b>${a.status}</b></p>

<p>Cycli: <b>${a.cycli}</b></p>

<p class="small">
Laatste wijziging:<br>
${a.laatste}
</p>

<button class="vol"
onclick="setVol(${index})">
🟢 Vol
</button>

<button class="storage"
onclick="setStorage(${index})">
🟡 Storage
</button>

<button class="leeg"
onclick="setLeeg(${index})">
🔴 Leeg
</button>

</div>

`;

});

document.getElementById("app").innerHTML=html;

}

function renderSingle(accuId){

const index=
accus.findIndex(a=>a.id===accuId);

if(index===-1){

renderOverzicht();
return;

}

const a=accus[index];

let html=`

<div class="card ${statusClass(a.status)}">

<h2>${a.id}</h2>

<p>${a.type}</p>

<p>Status: <b>${a.status}</b></p>

<p>Cycli: <b>${a.cycli}</b></p>

<p class="small">
Laatste wijziging:<br>
${a.laatste}
</p>

<button class="vol"
onclick="setVol(${index})">
🟢 Vol
</button>

<button class="storage"
onclick="setStorage(${index})">
🟡 Storage
</button>

<button class="leeg"
onclick="setLeeg(${index})">
🔴 Leeg
</button>

<br><br>

<button class="terug"
onclick="window.location='?'">
⬅ Terug naar overzicht
</button>

</div>

`;

document.getElementById("app").innerHTML=html;

}

function render(){

const params=
new URLSearchParams(window.location.search);

const id=params.get("id");

if(id){

renderSingle(id);

}else{

renderOverzicht();

}

}

laden();
render();

</script>

</body>
</html>
